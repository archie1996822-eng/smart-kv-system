name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build
        env:
          VITE_GRSAI_API_KEY: ${{ secrets.GRSAI_API_KEY }}
        run: |
          echo "API Key configured: ${{ secrets.GRSAI_API_KEY != '' }}"
          npm run build
      - name: Verify build
        run: |
          echo "Checking for API key in build..."
          if grep -q "sk-" dist/assets/*.js; then echo "OK: API key found in build"; else echo "WARNING: No API key found!"; fi
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
